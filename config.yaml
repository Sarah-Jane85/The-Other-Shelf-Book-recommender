project:
  name: the-other-shelf
  version: "1.0"

collectors:
  non_western_fantasy:
    keywords_file: Data/Keywords/non_western_fantasy_keywords.json
    target_books_min: 1000
    target_books_max: 5000
    api_target: 500
    scrape_target: 500
    per_query_limit: 100

  mature_graphic_novels:
    keywords_file: Data/Keywords/mature_graphic_novels_keywords.json
    target_books_min: 1000
    target_books_max: 5000
    api_target: 500
    scrape_target: 500
    per_query_limit: 100

  non_fiction:
    keywords_file: Data/Keywords/non_fiction_keywords.json
    target_books_min: 1000
    target_books_max: 5000
    api_target: 500
    scrape_target: 500
    per_query_limit: 100

api:
  open_library:
    base_url: "https://openlibrary.org/search.json"
    rate_limit_seconds: 1
    max_results_per_query: 100

# --- non_western_fantasy ---
input_data_non_western_fantasy:
  keywords: Data/Keywords/non_western_fantasy_keywords.json

output_data_raw_non_western_fantasy:
  ol_results:       Data/Raw/non_western_fantasy/ol_genre_first.json
  gr_results:       Data/Raw/non_western_fantasy/goodreads_with_descriptions.csv

output_data_clean_non_western_fantasy:
  merged:           Data/Clean/non_western_fantasy/merged_non_western_fantasy.json
  merged_csv:       Data/Clean/non_western_fantasy/merged_non_western_fantasy.csv

output_data_models_non_western_fantasy:
  tfidf_matrix:     Models/fantasy_tfidf_matrix.npz
  vectorizer:       Models/fantasy_vectorizer.pkl
  books_index:      Models/fantasy_books_index.json

# --- mature_graphic_novels ---
input_data_mature_graphic_novels:
  keywords:

output_data_raw_mature_graphic_novels:
  api_results:
  scraped_results:

output_data_clean_mature_graphic_novels:
  deduplicated:
  filtered:
  final:

# --- non_fiction ---
input_data_non_fiction:
  keywords:

output_data_raw_non_fiction:
  api_results:     "Data/Raw/non fiction/leftpolitics_raw(API).csv"
  scraped_results: "Data/Raw/non fiction/leftpolitics_raw(scraping).csv"

output_data_clean_non_fiction:
  deduplicated:    "Data/non fiction/leftpolitics_clean(scraping).csv"
  filtered:        "Data/non fiction/leftpolitics_clean.csv"
  with_descriptions: "Data/non fiction/leftpolitics_with_descriptions.csv"
  final:           "Data/non fiction/leftpolitics_final_clean.csv"

# --- recommender ---
recommender:
  data:            "Data/non fiction/leftpolitics_final_clean.csv"
  src:             Src/recommender.py
  streamlit_page:  Streamlit/Pages/recommendations.py

# --- shared Streamlit inputs ---
input_data_streamlit:
  non_western_fantasy:  Data/Clean/non_western_fantasy/merged_non_western_fantasy.json
  models:               Models/
  graphic_novels:
  non_fiction:          "Data/Clean/non_fiction/leftpolitics_final_clean.csv"